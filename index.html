<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>MixAudioLab</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#1a1a1a;color:#e0e0e0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;-webkit-user-select:none;user-select:none;overflow-x:hidden}
#hdr{background:#111;border-bottom:1px solid #282828;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:12px}
#logo{font-size:15px;font-weight:700;color:#fff;white-space:nowrap}
#round-box{text-align:center}
#round-name{font-size:28px;font-weight:900;color:#fff;letter-spacing:3px;line-height:1}
#round-desc{font-size:11px;color:#555;margin-top:3px}
#auth-area{display:flex;align-items:center;gap:8px;min-width:0}
#user-email{font-size:11px;color:#555;max-width:140px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn{border:none;border-radius:4px;cursor:pointer;padding:6px 12px;font-size:12px;font-weight:600}
#btn-login{background:#4285f4;color:#fff}
#btn-logout{background:#333;color:#ccc;display:none}
#transport{background:#161616;border-bottom:1px solid #282828;padding:7px 16px;display:flex;align-items:center;gap:6px}
.tbtn{background:#252525;border:1px solid #363636;border-radius:4px;color:#ccc;width:34px;height:30px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .1s}
.tbtn:hover{background:#2e2e2e}
#tbtn-play{color:#22cc44}
#tbtn-stop{color:#ffcc00}
#tbtn-play.on{background:#1a3020;border-color:#22cc44}
#t-time{font-family:'Courier New',monospace;font-size:13px;color:#777;margin-left:10px;min-width:88px}
#vote-banner{background:#13131f;border-bottom:1px solid #282828;padding:8px 16px;display:none;align-items:center;gap:10px;flex-wrap:wrap}
#vote-opts{display:flex;gap:5px;flex-wrap:wrap}
.vopt{background:#222;border:1px solid #363636;border-radius:3px;cursor:pointer;padding:4px 12px;font-size:12px;font-weight:700;color:#aaa;transition:all .1s}
.vopt:hover{border-color:#555}
.vopt.sel{background:#1a3050;border-color:#4A9EFF;color:#fff}
.vopt.done{background:#1a3020;border-color:#22cc44;color:#22cc44;cursor:default}
#btn-enviar{background:#4A9EFF;color:#fff;border:none;border-radius:4px;padding:5px 16px;font-size:13px;font-weight:700;cursor:pointer}
#btn-enviar:disabled{opacity:.4;cursor:not-allowed}
#vote-ok{color:#22cc44;font-weight:600;font-size:13px;display:none}
#vote-status{font-size:12px;color:#555}
#login-notice{padding:7px 16px;font-size:12px;color:#444;border-bottom:1px solid #222}
#tracks{display:flex;flex-direction:column}
.track{display:flex;height:160px;border-bottom:1px solid #252525;overflow:hidden}
.t-hdr{width:162px;min-width:162px;background:#1c1c1c;border-right:1px solid #252525;display:flex;flex-direction:column;padding:5px 7px;gap:3px}
.t-name-row{display:flex;align-items:center;justify-content:space-between;height:20px}
.t-name{font-size:12px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:108px}
.bmute{width:22px;height:22px;border-radius:3px;border:1px solid #3a3a3a;cursor:pointer;font-size:10px;font-weight:700;color:#777;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center}
.bmute.on{background:rgba(255,204,0,.18);border-color:#ffcc00;color:#fff}
.t-ctrl{display:flex;flex:1;gap:4px;min-height:0}
.bsolo-col{display:flex;flex-direction:column;justify-content:flex-start;padding-top:3px}
.bsolo{width:22px;height:22px;border-radius:3px;border:1px solid #3a3a3a;cursor:pointer;font-size:10px;font-weight:700;color:#777;background:rgba(255,255,255,.04);display:flex;align-items:center;justify-content:center}
.bsolo.on{background:rgba(34,204,68,.18);border-color:#22cc44;color:#fff}
.fwrap{flex:1;display:flex;flex-direction:column;min-height:0}
.farea{flex:1;position:relative;min-height:20px;display:flex;justify-content:center}
.fgroove{position:absolute;top:5px;bottom:5px;left:50%;transform:translateX(-50%);width:3px;background:#333;border-radius:2px}
.fgroove::after{content:'';position:absolute;left:-5px;width:13px;height:1px;background:#484848;top:calc(20% - 0.5px)}
.fthumb{position:absolute;left:50%;transform:translateX(-50%);width:30px;height:10px;background:linear-gradient(to bottom,#d5d5d5,#888);border-radius:2px;border:1px solid #aaa;cursor:grab;touch-action:none;box-shadow:0 1px 4px rgba(0,0,0,.6)}
.fthumb:active{cursor:grabbing}
.fdb{text-align:center;font-size:10px;font-family:monospace;color:#777;height:14px;line-height:14px;cursor:default}
.vuwrap{display:flex;flex-direction:column;gap:2px;height:18px}
.vurow{flex:1;display:flex;gap:1px}
.vled{flex:1;border-radius:1px;background:#242424}
.vled.g{background:#1a8a28}
.vled.y{background:#aaa000}
.vled.o{background:#cc6200}
.vled.r{background:#cc1010}
.tdl{display:flex;align-items:center;gap:4px;cursor:pointer;background:none;border:none;color:#484848;font-size:10px;padding:0;transition:color .1s;height:18px}
.tdl:hover{color:#999}
.tdl svg{width:12px;height:12px;flex-shrink:0}
.t-wave{flex:1;position:relative;background:#1e1e1e;cursor:crosshair;overflow:hidden}
.wcv{position:absolute;inset:0;width:100%;height:100%;display:block}
.wload{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#383838;pointer-events:none}
#admin{display:none;background:#0f0f18;border-top:2px solid #252525;padding:16px}
#admin h2{font-size:12px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
#admin-top{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.abtn{border:none;border-radius:4px;cursor:pointer;padding:6px 14px;font-size:12px;font-weight:700}
#btn-tvote{background:#1a6a2a;color:#fff}
#btn-tvote.open{background:#6a1a1a}
.aexp{background:#1e1e1e;color:#999;border:1px solid #2a2a2a;border-radius:4px;padding:6px 14px;font-size:12px;cursor:pointer}
#admin-grid{display:grid;grid-template-columns:1fr 260px;gap:16px}
#admin-grid h3{font-size:11px;color:#444;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
#vtbl{width:100%;border-collapse:collapse;font-size:11px}
#vtbl th{background:#161616;color:#444;padding:4px 8px;text-align:left;border-bottom:1px solid #222}
#vtbl td{padding:3px 8px;border-bottom:1px solid #1e1e1e;color:#bbb}
#pie-cv{display:block;margin:0 auto;max-width:230px;height:230px}
#vchips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.vchip{font-size:11px;background:#161616;border-radius:3px;padding:2px 8px;color:#999}
#notif{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:8px 20px;border-radius:6px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .25s;z-index:999}
#notif.show{opacity:1}
@media print{#hdr,#transport,#vote-banner,#login-notice,#tracks,#notif{display:none}#admin{display:block!important}}
@media(max-width:600px){.track{height:130px}.t-hdr{width:132px;min-width:132px}#round-name{font-size:18px}#admin-grid{grid-template-columns:1fr}#logo{display:none}}
</style>
</head>
<body>

<header id="hdr">
  <div id="logo">🎚 MixAudioLab</div>
  <div id="round-box"><div id="round-name">—</div><div id="round-desc"></div></div>
  <div id="auth-area">
    <span id="user-email"></span>
    <button class="btn" id="btn-login">Entrar con Google</button>
    <button class="btn" id="btn-logout">Salir</button>
  </div>
</header>

<div id="transport">
  <button class="tbtn" id="tbtn-goto" title="Ir al inicio">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor"><rect x="0" y="1" width="2" height="12" rx="1"/><polygon points="13,1 4,7 13,13"/></svg>
  </button>
  <button class="tbtn" id="tbtn-play" title="Play (Espacio)">
    <svg width="11" height="12" viewBox="0 0 11 12" fill="currentColor"><polygon points="0,0 11,6 0,12"/></svg>
  </button>
  <button class="tbtn" id="tbtn-stop" title="Stop">
    <svg width="11" height="11" viewBox="0 0 11 11" fill="currentColor"><rect width="11" height="11" rx="1"/></svg>
  </button>
  <span id="t-time">0:00.000</span>
</div>

<div id="vote-banner">
  <span style="color:#666;font-size:12px">Tu voto:</span>
  <div id="vote-opts"></div>
  <button id="btn-enviar" disabled>Enviar</button>
  <div id="vote-ok">✓ Voto confirmado</div>
  <span id="vote-status"></span>
</div>
<div id="login-notice">Iniciá sesión para votar →</div>

<div id="tracks"></div>

<div id="admin">
  <h2>Administración</h2>
  <div id="admin-top">
    <button class="abtn" id="btn-tvote">Abrir votación</button>
    <button class="aexp" id="btn-epng">Exportar PNG</button>
    <button class="aexp" id="btn-epdf">Exportar PDF</button>
  </div>
  <div id="admin-grid">
    <div>
      <h3>Votantes (<span id="vtotal">0</span>)</h3>
      <table id="vtbl"><thead><tr><th>Email</th><th>Track</th><th>Hora</th></tr></thead><tbody id="vtbody"></tbody></table>
    </div>
    <div>
      <h3>Resultados</h3>
      <canvas id="pie-cv" width="230" height="230"></canvas>
      <div id="vchips"></div>
    </div>
  </div>
</div>

<div id="notif"></div>

<script>
'use strict';

// ── CONSTANTS ──────────────────────────────────────────────
const COLORS = ['#4A9EFF','#FF6B6B','#69DB7C','#FFD43B','#DA77F2','#FF922B','#38D9A9','#F783AC'];
const DB0 = 0.80; // fader position = 0 dB
const LEDS = [
  {d:-60,c:'g'},{d:-54,c:'g'},{d:-48,c:'g'},{d:-42,c:'g'},{d:-36,c:'g'},
  {d:-30,c:'g'},{d:-25,c:'g'},{d:-21,c:'g'},{d:-18,c:'g'},{d:-15,c:'y'},
  {d:-12,c:'y'},{d:-9,c:'y'},{d:-6,c:'y'},{d:-4,c:'o'},{d:-2,c:'o'},
  {d:0,c:'r'},{d:1,c:'r'},{d:3,c:'r'},{d:5,c:'r'},{d:6,c:'r'}
];

// ── STATE ──────────────────────────────────────────────────
const S = {
  cfg: null, playing: false,
  soloId: null, muted: new Set(),
  fpos: {},
  user: null, isAdmin: false,
  votingOpen: false, selVote: null, voteOk: false
};

// ── AUDIO ENGINE (direct — no Web Audio API) ───────────────
const AE = {
  T: {},

  register: function(id, audio) {
    this.T[id] = { audio: audio };
    this.applyFader(id);
    this.applyMute(id);
  },

  play: function() {
    var self = this;
    Object.keys(self.T).forEach(function(id) {
      self.T[id].audio.play().catch(function(e) { console.error('play', id, e.message); });
    });
  },

  stop: function() {
    Object.keys(this.T).forEach(function(id) {
      this.T[id].audio.pause();
    }.bind(this));
  },

  seek: function(s) {
    Object.keys(this.T).forEach(function(id) {
      try { this.T[id].audio.currentTime = s; } catch(e) {}
    }.bind(this));
  },

  setFader: function(id, pos) {
    S.fpos[id] = pos;
    this.applyFader(id);
  },

  applyFader: function(id) {
    var t = this.T[id];
    if (!t) return;
    var db = p2db(S.fpos[id] !== undefined ? S.fpos[id] : DB0);
    t.audio.volume = isFinite(db) ? Math.min(1, Math.pow(10, db / 20)) : 0;
  },

  solo: function(id) {
    S.soloId = (S.soloId === id) ? null : id;
    var self = this;
    Object.keys(self.T).forEach(function(i) { self.applyMute(i); });
    refreshSM();
  },

  mute: function(id) {
    if (S.muted.has(id)) { S.muted.delete(id); } else { S.muted.add(id); }
    this.applyMute(id);
    refreshSM();
  },

  applyMute: function(id) {
    var t = this.T[id];
    if (!t) return;
    var on = (S.soloId === null || S.soloId === id) && !S.muted.has(id);
    t.audio.muted = !on;
  },

  time: function() {
    var keys = Object.keys(this.T);
    return keys.length ? (this.T[keys[0]].audio.currentTime || 0) : 0;
  },

  dur: function() {
    var keys = Object.keys(this.T);
    return keys.length ? (this.T[keys[0]].audio.duration || 0) : 0;
  }
};

// ── MATH ───────────────────────────────────────────────────
function p2db(p) {
  if (p <= 0) return -Infinity;
  return p <= DB0 ? -60 + (p / DB0) * 60 : ((p - DB0) / (1 - DB0)) * 6;
}
function db2p(db) {
  if (!isFinite(db) || db <= -60) return 0;
  return db <= 0 ? ((db + 60) / 60) * DB0 : DB0 + (db / 6) * (1 - DB0);
}
function fmtDb(p) {
  var db = p2db(p);
  return isFinite(db) ? (db >= 0 ? '+' : '') + db.toFixed(1) + ' dB' : '-∞ dB';
}
function fmtT(s) {
  if (!isFinite(s)) return '0:00.000';
  var m = Math.floor(s / 60), ss = Math.floor(s % 60), ms = Math.floor((s % 1) * 1000);
  return m + ':' + String(ss).padStart(2,'0') + '.' + String(ms).padStart(3,'0');
}

// ── WAVEFORM ───────────────────────────────────────────────
var WF = {};

function loadPeaks(id, url) {
  return fetch(url)
    .then(function(r) { return r.json(); })
    .then(function(d) {
      WF[id].peaks   = d.peaks   || [];
      WF[id].peaks_l = d.peaks_l || null;
      WF[id].peaks_r = d.peaks_r || null;
    })
    .catch(function(e) { console.error('peaks', id, e); });
}

function buildOC(id) {
  var cv = document.querySelector('.track[data-id="' + id + '"] .wcv');
  if (!cv || !WF[id]) return;
  var W = cv.offsetWidth, H = cv.offsetHeight;
  if (!W || !H) return;
  cv.width = W; cv.height = H;
  var oc = document.createElement('canvas');
  oc.width = W; oc.height = H;
  var ox = oc.getContext('2d');
  var pL = WF[id].peaks_l || WF[id].peaks;
  var pR = WF[id].peaks_r || WF[id].peaks;
  var isStereo = !!(WF[id].peaks_l && WF[id].peaks_r);
  var N = pL.length, cx = H / 2;
  ox.clearRect(0, 0, W, H);
  if (!N) { WF[id].oc = oc; return; }
  ox.fillStyle = 'rgba(255,255,255,0.07)';
  ox.fillRect(0, cx, W, 1);
  ox.fillStyle = WF[id].color + 'cc';
  var i, x, w, aL, aR, amp;
  if (isStereo) {
    for (i = 0; i < N; i++) {
      x = (i / N) * W; w = Math.max(1, W / N);
      aL = pL[i] * cx * 0.9; aR = pR[i] * cx * 0.9;
      ox.fillRect(x, cx - aL, w, aL);
      ox.fillRect(x, cx, w, aR);
    }
  } else {
    for (i = 0; i < N; i++) {
      x = (i / N) * W; w = Math.max(1, W / N);
      amp = pL[i] * cx * 0.88;
      ox.fillRect(x, cx - amp, w, amp * 2);
    }
  }
  WF[id].oc = oc;
}

function paintWF(id, cv) {
  if (!WF[id]) return;
  var ctx = cv.getContext('2d'), W = cv.width, H = cv.height;
  ctx.clearRect(0, 0, W, H);
  if (WF[id].oc) ctx.drawImage(WF[id].oc, 0, 0);
  var dur = AE.dur();
  if (dur > 0) {
    var x = (AE.time() / dur) * W;
    ctx.strokeStyle = 'rgba(255,255,255,.85)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
}

// ── VU METER (UI only — inactive without Web Audio) ────────
var VU = {};
function buildVU(container) {
  var res = { l: [], r: [] };
  ['l','r'].forEach(function(ch) {
    var row = document.createElement('div');
    row.className = 'vurow';
    LEDS.forEach(function(led) {
      var el = document.createElement('div');
      el.className = 'vled';
      row.appendChild(el);
      res[ch].push({ el: el, d: led.d, c: led.c });
    });
    container.appendChild(row);
  });
  return res;
}

// ── FADER ──────────────────────────────────────────────────
function initFader(id, area, thumb, dbEl) {
  S.fpos[id] = DB0;
  placeThumb(thumb, DB0);
  dbEl.textContent = fmtDb(DB0);
  var drag = false;

  function getPos(e) {
    var cy = e.touches ? e.touches[0].clientY : e.clientY;
    var r = area.getBoundingClientRect();
    return Math.max(0, Math.min(1, 1 - (cy - r.top) / r.height));
  }
  function setPos(p) {
    S.fpos[id] = p;
    placeThumb(thumb, p);
    dbEl.textContent = fmtDb(p);
    AE.setFader(id, p);
  }

  thumb.addEventListener('mousedown',  function(e) { e.preventDefault(); drag = true; });
  thumb.addEventListener('touchstart', function(e) { e.preventDefault(); drag = true; }, { passive: false });
  window.addEventListener('mousemove',  function(e) { if (drag) setPos(getPos(e)); });
  window.addEventListener('touchmove',  function(e) { if (drag) { e.preventDefault(); setPos(getPos(e)); } }, { passive: false });
  window.addEventListener('mouseup',   function() { drag = false; });
  window.addEventListener('touchend',  function() { drag = false; });
  thumb.addEventListener('dblclick', function() { setPos(DB0); });
  dbEl.addEventListener('dblclick', function() {
    var v = prompt('dB (−60 a 0):', p2db(S.fpos[id] || DB0).toFixed(1));
    if (!v) return;
    var n = parseFloat(v);
    if (!isNaN(n)) setPos(db2p(Math.max(-60, Math.min(0, n))));
  });
}

function placeThumb(thumb, pos) {
  thumb.style.top = 'calc(' + ((1 - pos) * 100) + '% - 5px)';
}

// ── BUILD TRACKS ───────────────────────────────────────────
function buildTracks(tracks) {
  var wrap = document.getElementById('tracks');
  tracks.forEach(function(t, i) {
    var color = COLORS[i % COLORS.length];
    WF[t.id] = { peaks: [], peaks_l: null, peaks_r: null, oc: null, color: color };
    S.fpos[t.id] = DB0;

    var div = document.createElement('div');
    div.className = 'track';
    div.dataset.id = t.id;
    div.innerHTML =
      '<div class="t-hdr">' +
        '<div class="t-name-row">' +
          '<span class="t-name" title="' + t.nombre + '">' + t.nombre + '</span>' +
          '<button class="bmute" data-id="' + t.id + '">M</button>' +
        '</div>' +
        '<div class="t-ctrl">' +
          '<div class="bsolo-col"><button class="bsolo" data-id="' + t.id + '">S</button></div>' +
          '<div class="fwrap">' +
            '<div class="farea" data-id="' + t.id + '">' +
              '<div class="fgroove"></div>' +
              '<div class="fthumb"></div>' +
            '</div>' +
            '<div class="fdb" data-id="' + t.id + '">0.0 dB</div>' +
          '</div>' +
        '</div>' +
        '<div class="vuwrap" data-id="' + t.id + '"></div>' +
        '<button class="tdl">' +
          '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">' +
            '<path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>' +
            '<polyline points="7 10 12 15 17 10"/>' +
            '<line x1="12" y1="15" x2="12" y2="3"/>' +
          '</svg>Download' +
        '</button>' +
      '</div>' +
      '<div class="t-wave" data-id="' + t.id + '">' +
        '<canvas class="wcv" data-id="' + t.id + '"></canvas>' +
        '<div class="wload">Cargando…</div>' +
      '</div>';

    var audio = document.createElement('audio');
    audio.preload = i < 2 ? 'auto' : 'metadata';
    var s1 = document.createElement('source'); s1.src = t.opus; s1.type = 'audio/ogg; codecs=opus';
    var s2 = document.createElement('source'); s2.src = t.m4a;  s2.type = 'audio/mp4';
    audio.appendChild(s1); audio.appendChild(s2);
    div.appendChild(audio);

    AE.register(t.id, audio);

    audio.addEventListener('canplaythrough', function() {
      var wl = div.querySelector('.wload');
      if (wl) wl.style.display = 'none';
    });
    audio.addEventListener('ended', function() {
      S.playing = false;
      document.getElementById('tbtn-play').classList.remove('on');
    });

    wrap.appendChild(div);

    VU[t.id] = buildVU(div.querySelector('.vuwrap'));
    initFader(t.id, div.querySelector('.farea'), div.querySelector('.fthumb'), div.querySelector('.fdb'));

    (function(tid) {
      div.querySelector('.bsolo').addEventListener('click', function() { AE.solo(tid); });
      div.querySelector('.bmute').addEventListener('click', function() { AE.mute(tid); });
      div.querySelector('.tdl').addEventListener('click', function() {
        var a = document.createElement('a'); a.href = t.wav; a.download = t.nombre + '.wav'; a.click();
      });
      var wave = div.querySelector('.t-wave');
      wave.addEventListener('click', function(e) {
        var r = wave.getBoundingClientRect(), dur = AE.dur();
        if (dur > 0) AE.seek(((e.clientX - r.left) / r.width) * dur);
        if (S.soloId !== tid) {
          S.soloId = tid;
          Object.keys(AE.T).forEach(function(id) { AE.applyMute(id); });
          refreshSM();
        }
        if (!S.playing) {
          S.playing = true; AE.play();
          document.getElementById('tbtn-play').classList.add('on');
        }
      });
      new ResizeObserver(function() { buildOC(tid); }).observe(wave);
    })(t.id);

    loadPeaks(t.id, t.peaks).then(function() {
      requestAnimationFrame(function() { buildOC(t.id); });
    });
  });
}

// ── UI ─────────────────────────────────────────────────────
function refreshSM() {
  document.querySelectorAll('.bsolo').forEach(function(b) { b.classList.toggle('on', S.soloId === b.dataset.id); });
  document.querySelectorAll('.bmute').forEach(function(b) { b.classList.toggle('on', S.muted.has(b.dataset.id)); });
}

// ── ANIMATION LOOP ─────────────────────────────────────────
function loop() {
  document.getElementById('t-time').textContent = fmtT(AE.time());
  document.querySelectorAll('.wcv').forEach(function(cv) {
    var id = cv.dataset.id;
    if (cv.width !== cv.offsetWidth || cv.height !== cv.offsetHeight) {
      cv.width = cv.offsetWidth; cv.height = cv.offsetHeight; buildOC(id);
    }
    paintWF(id, cv);
  });
  requestAnimationFrame(loop);
}

// ── TRANSPORT ──────────────────────────────────────────────
var tbPlay = document.getElementById('tbtn-play');
document.getElementById('tbtn-goto').addEventListener('click', function() {
  AE.seek(0); if (S.playing) AE.play();
});
tbPlay.addEventListener('click', function() {
  if (!S.playing) { S.playing = true; AE.play(); tbPlay.classList.add('on'); }
});
document.getElementById('tbtn-stop').addEventListener('click', function() {
  if (S.playing) { S.playing = false; AE.stop(); tbPlay.classList.remove('on'); }
});
document.addEventListener('keydown', function(e) {
  if (['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName)) return;
  if (e.code !== 'Space') return;
  e.preventDefault();
  if (S.playing) { S.playing = false; AE.stop(); tbPlay.classList.remove('on'); }
  else { S.playing = true; AE.play(); tbPlay.classList.add('on'); }
});

// ── NOTIFICATION ───────────────────────────────────────────
var nT;
function notify(msg) {
  var el = document.getElementById('notif');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(nT); nT = setTimeout(function() { el.classList.remove('show'); }, 3000);
}

// ── AUTH PLACEHOLDER (Firebase en Parte 2) ─────────────────
document.getElementById('btn-login').style.display  = 'none';
document.getElementById('btn-logout').style.display = 'none';
document.getElementById('login-notice').style.display = 'none';

// ── INIT ───────────────────────────────────────────────────
async function init() {
  try {
    var r = await fetch('config.json');
    S.cfg = await r.json();
    var ronda = S.cfg.ronda || {};
    document.title = S.cfg.app_name || 'MixAudioLab';
    document.getElementById('round-name').textContent = ronda.nombre || 'Ronda';
    document.getElementById('round-desc').textContent = ronda.descripcion || '';
    buildTracks(ronda.tracks || []);
    requestAnimationFrame(loop);
  } catch(e) {
    console.error('init:', e);
    notify('Error cargando config.json');
  }
}

init();
</script>
</body>
</html>
